<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <style>
         body {
            margin: 0;
            font-family: "Quicksand", sans-serif;
        }
        
        :root{
            --very-light-pink:#c7c7c7;
            --text-input-field:#f7f7f7;
            --hospital-green: #acd9b2;
            --white:#ffffff;
            --black: #000000;
            --sm: 14px;
            --md: 16px;
            --lg: 18px;
        }

        .product-detail {
            width: 360px;
            padding: 24px;
            position: absolute;
            right: 0;
        }

        .order {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 16px;
            align-items: center;
            background-color: var(--text-input-field);
            margin-bottom: 24px;
            border-radius: 8px;
            padding: 0 24px;
        }

        .order p:nth-child(2){
            text-align: end;
            font-weight: bold;
        }

        .order p span:nth-child(1){
            font-size: var(--md);
            font-weight: bold;
        }

        .primary-button{
            background-color: var(--hospital-green);
            border-radius: 8px;
            border: none;
            color: var(--white);
            width: 100%;
            cursor: pointer;
            font-size: var(--md);
            font-weight: bold;
            height: 50px;
            margin-top: 15px;
        }

        .add-cart{
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 640px){
            .product-detail{
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <aside class="product-detail">
        <div class="my-order-content">
                <div class="order">
                    <p>
                        <span>04.25.21</span>
                    </p>
                    <p>$560.00</p>
                </div>
                <div class="shopping-cart">
                <figure>
                    <img src="https://images.pexels.com/photos/17310470/pexels-photo-17310470.jpeg" alt="">
                </figure>
                <p>Bike</p>
                <p>$30.00</p>

                </div>
                <div class="shopping-cart">
                <figure>
                    <img src="https://images.pexels.com/photos/17310470/pexels-photo-17310470.jpeg" alt="">
                </figure>
                <p>Bike</p>
                <p>$30.00</p>

                </div>
                <div class="shopping-cart">
                <figure>
                    <img src="https://images.pexels.com/photos/17310470/pexels-photo-17310470.jpeg" alt="">
                </figure>
                <p>Bike</p>
                <p>$30.00</p>

                </div>
      
            </div>
    </aside>
</body>
</html>
