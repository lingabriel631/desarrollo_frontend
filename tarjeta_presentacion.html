<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .verde {
            background: #0ad19f;
            width: 200px;
            height: 150px;
        }
        .blanco {
            background: white;
            width: 200px;
            height: 150px;
        }

        div.verde {
            display: flex;
            justify-content: center;
        }

        img {
            width: 90px;
            height: 90px;
            align-items: center;
            margin-top: 70px;
            border: 5px solid white;
            border-radius: 15px; 
        }

       .nombre{
        text-align: center;
        margin-top: 30px;
        font-weight: bold;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 20px;
       }

       .puesto {
        text-align: center;
        font-size: 15px;
        box-sizing: border-box;
        margin-top: -20px;
       }

       .dui {
        text-align: center;
        margin-top: 7px;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 15px;
       }
    </style>
</head>
<body>
    <section>
        <div class="verde">
            <img src="foto_carnet.jpg" alt="foto">
        </div>
        <div class="blanco">
            <p class="nombre">Gabriel Linares</p>
            <p class="puesto">Ejecutivo comercial</p>
            <p class="dui">DUI 01031288-1</p>
            <div>
                <p>cubo</p>
            </div>
        </div>
        
    </section>
</body>
</html>
